name: Release CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies and build tools
        shell: pwsh
        run: |
          # Use the unified Go runner for setup
          go run sb.go setup
          # Install pyinstaller into the same venv
          ./.venv/Scripts/pip.exe install pyinstaller

      - name: Build Executable
        shell: pwsh
        run: |
          # Use pyinstaller from the venv
          ./.venv/Scripts/pyinstaller --noconfirm --onefile --windowed --add-data "README.md;." web_app.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/web_app.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
